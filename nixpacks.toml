[phases.setup]
nixPkgs = ["nodejs", "python310", "python310Packages.pip", "gcc"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "python3 -m pip install -r backend/requirements.txt"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "python3 backend/serve_prod.py"
