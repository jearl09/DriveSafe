services:
  # 1. The Backend (Flask)
  - type: web
    name: drivesafe-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --port=$PORT app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drivesafe-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. The Frontend (React)
  - type: web
    name: drivesafe-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    # This "Rewrite" rule tells Vercel/Render to send all /api requests to the backend
    routes:
      - type: rewrite
        source: /api/*
        destination: https://drivesafe-backend.onrender.com/api/*
      - type: rewrite
        source: /auth/*
        destination: https://drivesafe-backend.onrender.com/auth/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: drivesafe-db
    plan: free
