services:
  # The All-in-One DriveSafe Service
  - type: web
    name: drivesafe-app
    env: python
    # We run from the root so we can access both /frontend and /backend
    rootDir: .
    # Build React first, then install Python requirements
    buildCommand: |
      cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    # Start the Flask app using Waitress
    startCommand: |
      cd backend && waitress-serve --port=$PORT app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drivesafe-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.10"
      - key: NODE_VERSION
        value: "18.0.0"

databases:
  - name: drivesafe-db
    plan: free
